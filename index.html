<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--Favicon-->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <!--CSS Link-->
  <link rel="stylesheet" href="./style.css">

  <!--Google Font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&family=Young+Serif&display=swap"
    rel="stylesheet">

  <title>Frontend Mentor | Blog preview card</title>
</head>

<!--Body Container-->

<body>

  <!--Card Container-->
  <div class="card-container">

    <!--Image Container-->
    <div class="img-container container">
      <img width="100%" height="auto" src="./assets/images/illustration-article.svg" alt="Card Image">
    </div>

    <!--Learning Continer-->
    <div class="learning-container container">
      <h3>Learning</h3>
    </div>

    <div class="date-container container">
      <h5> Published 21 Dec 2023</h5>
    </div>

    <!--Title Continer-->
    <div class="title-container container">
      <h2>HTML & CSS foundations</h2>
    </div>

    <!--Paragraph Container-->
    <div class="paragraph-container container">
      <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>

    <!--Author Container-->
    <div class="author-container container">

      <!--Image Container-->
      <div class="auth-img">
        <img width="80%" src="./assets/images/image-avatar.webp" alt="Author Image">
      </div>

      <!--Author Name Container-->
      <div class="auth-name">
        <p>Greg Hooper</p>
      </div>
    </div>
  </div>

  <footer class="attribution">
  Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
  Coded by <a href="https://project-1-personal-portfolio.vercel.app/">Philo Yesudas Philip</a>.
</footer>
</body>


</html>
